urc_field_params:
  # Visual servo PID
  servo:
    kp_bearing: 0.03
    ki_bearing: 0.0005
    kd_bearing: 0.008
    max_angular: 0.6
    max_linear: 0.4
    stop_distance_m: 1.8
    bearing_deadband_deg: 1.5
    detection_timeout_s: 1.5
    obstacle_halt_distance_m: 1.2

  # ArUco detector
  aruco:
    use_clahe: true
    confirm_frames: 3
    loss_frames: 5

  # Search behavior
  search:
    rotate_speed_rad: 0.3
    arc_radius_m: 4.0
    arc_omega_rad: 0.12
    search_timeout_s: 45.0

  # Mission
  mission:
    stop_distance_m: 1.8
    search_timeout_s: 45.0
    total_mission_timeout_s: 600.0

  # Object detector
  detector:
    confidence_threshold: 0.45
    publish_rate_hz: 15.0

  # E-stop
  estop:
    heartbeat_timeout_s: 3.0
    min_marker_distance_m: 0.5
